name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build virgil
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          VERSION=""
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          LDFLAGS=""
          if [ -n "$VERSION" ]; then
            LDFLAGS="-X main.version=${VERSION}"
          fi
          go build -trimpath -ldflags "$LDFLAGS" -o "dist/virgil-${GOOS}-${GOARCH}" ./cmd/virgil
          go build -trimpath -o "dist/virgil-inspect-${GOOS}-${GOARCH}" ./cmd/inspect
          chmod +x "dist/virgil-${GOOS}-${GOARCH}"
          chmod +x "dist/virgil-inspect-${GOOS}-${GOARCH}"
      - uses: actions/upload-artifact@v4
        with:
          name: virgil-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/virgil-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/virgil-inspect-${{ matrix.goos }}-${{ matrix.goarch }}
